services:
  - type: web
    runtime: image
    name: abbeylodge-wordpress
    plan: starter
    region: oregon
    image:
      url: ghcr.io/nlisgo/abbeylodge-render-wp:latest
    healthCheckPath: /
    envVars:
      - key: APP_DATA_DIR
        value: /var/data
      - key: MYSQL_DATABASE
        value: wordpress
      - key: MYSQL_USER
        value: wordpress
      - key: MYSQL_PASSWORD
        generateValue: true
      - key: MYSQL_ROOT_PASSWORD
        generateValue: true
      - key: WORDPRESS_DB_HOST
        value: 127.0.0.1:3306
      - key: WORDPRESS_SITE_TITLE
        value: Abbey Lodge WordPress
      - key: WORDPRESS_ADMIN_USER
        value: admin
      - key: WORDPRESS_ADMIN_EMAIL
        value: admin@example.com
      - key: WORDPRESS_ADMIN_PASSWORD
        generateValue: true
      - key: ABBEYLODGE_SEED_ROOMS
        value: "1"
    disk:
      name: wordpress-data
      mountPath: /var/data
      sizeGB: 10
